meta:
  project: momo-web-ui
  plan_file: docs/dev/WEB_UI_EXEC_PLAN.md
  owner: 112560
  last_updated: 2026-04-30
  status: in_progress

principles:
  - 不串用户
  - 不写坏数据
  - 不串任务
  - 主流程可用
  - 再做视觉美化

current:
  phase: P1
  in_progress: P1-T1
  summary: Profile 隔离与并发基础（UserContextManager 代码已完成，启动阻塞问题待修）

phase_plan:
  P0:
    name: 用户入口 + Profile 上下文基础
    tasks:
      - id: P0-T1
        title: 创建 UserGateway 页面骨架
        purpose: 打开 Web 后提供 profile 选择/新建入口，避免用户直接进入业务页。
        implementation_scope:
          do:
            - 新建 UserGateway 页面基础布局（用户列表区 + 新建表单区）
            - 页面可读取并展示 users API 返回的 profile 列表
          dont:
            - 不实现业务页数据加载
            - 不实现复杂多步 wizard
        files_modules:
          - web/frontend/src/pages/UserGateway.tsx
          - web/frontend/src/router.tsx
          - web/frontend/src/api/client.ts
        detailed_requirements:
          - 页面首次进入显示“选择 profile / 新建 profile”主文案。
          - 列表展示已有 profile 名称与选择按钮。
          - 新建表单仅包含 profile_name 必填字段。
          - 调用失败时在页面内展示错误提示。
          - 页面样式沿用当前项目 Tailwind 体系。
        acceptance_criteria:
          - 访问入口路由时可看到 UserGateway 页面。
          - 能看到后端返回的 profile 列表。
          - 新建表单提交会发起 POST /api/users。
          - 出错时用户可见明确错误信息。
        dependencies:
          - POST /api/users 与 GET /api/users 接口可访问

      - id: P0-T2
        title: 实现 active profile 持久化
        purpose: 让用户刷新页面后不丢失当前 profile 选择。
        implementation_scope:
          do:
            - 新增 profile store 管理 activeProfile
            - 使用 localStorage 持久化 activeProfile
          dont:
            - 不处理多设备同步
            - 不处理权限认证
        files_modules:
          - web/frontend/src/stores/profile.ts
          - web/frontend/src/pages/UserGateway.tsx
          - web/frontend/src/main.tsx
        detailed_requirements:
          - store 初始化时从 localStorage 恢复 activeProfile。
          - 选择 profile 后立即写入 localStorage。
          - 清空/切换 profile 时同步更新 localStorage。
          - 提供统一 getter/setter 供 API 层读取。
        acceptance_criteria:
          - 选择 profile 后刷新页面仍保持当前 profile。
          - 切换 profile 后 localStorage 值同步变化。
          - 无 activeProfile 时值为空且不会报错。
        dependencies:
          - P0-T1

      - id: P0-T3
        title: 接入路由守卫与入口重定向
        purpose: 未选择 profile 时禁止进入业务页，强制回到 UserGateway。
        implementation_scope:
          do:
            - 为业务路由增加 guard
            - 无 activeProfile 自动重定向到入口页
          dont:
            - 不改业务页面内部逻辑
            - 不做权限系统
        files_modules:
          - web/frontend/src/router.tsx
          - web/frontend/src/App.tsx
          - web/frontend/src/stores/profile.ts
        detailed_requirements:
          - `/today /future /iteration /words /sync /preflight /users` 受 guard 保护。
          - 用户选定 profile 后可正常进入 Dashboard。
          - 直接输入业务 URL 且未选 profile 时会被拦截。
          - NotFound 路由行为保持不变。
        acceptance_criteria:
          - 未选 profile 访问业务页统一跳转 UserGateway。
          - 已选 profile 可访问全部业务页。
          - 路由切换不出现循环重定向。
        dependencies:
          - P0-T2

      - id: P0-T4
        title: API 请求透传 X-Momo-Profile
        purpose: 后端可按请求识别 profile，上下文不再依赖全局 ACTIVE_USER。
        implementation_scope:
          do:
            - 在 API client 统一注入 X-Momo-Profile
            - header 值来自 profile store
          dont:
            - 不修改具体业务接口参数
            - 不引入 Authorization
        files_modules:
          - web/frontend/src/api/client.ts
          - web/frontend/src/stores/profile.ts
          - web/frontend/src/hooks/*
        detailed_requirements:
          - 所有 apiClient/apiPost 请求默认带 X-Momo-Profile。
          - activeProfile 为空时可选择不发请求或返回前置错误。
          - 错误中包含 profile 缺失提示，避免 silent fail。
          - 保留后续注入 Authorization 的扩展位。
        acceptance_criteria:
          - 抓包可见所有业务请求包含 X-Momo-Profile。
          - profile 缺失时请求不会误打到后端业务逻辑。
          - 现有 API 调用方式不需要逐页改签名。
        dependencies:
          - P0-T2

      - id: P0-T5
        title: 新增会话与用户接口基础实现
        purpose: 提供前端入口页与会话信息所需后端能力。
        implementation_scope:
          do:
            - 实现 GET /api/users
            - 实现 POST /api/users
            - 实现 GET /api/session
          dont:
            - 不实现登录鉴权
            - 不实现租户系统
        files_modules:
          - web/backend/routers/users.py
          - web/backend/routers/session.py
          - web/backend/schemas.py
          - web/backend/app.py
        detailed_requirements:
          - 接口统一返回 {ok,data,error}。
          - POST /api/users 最小入参仅 profile_name。
          - GET /api/session 返回 active_profile、available_profiles、server_time、host_binding。
          - profile 不存在时返回明确错误码与 message。
        acceptance_criteria:
          - 三个接口可被前端成功调用。
          - 返回结构稳定且符合约定。
          - profile 错误场景有可读错误信息。
        dependencies:
          - 无

      - id: P0-T6
        title: 切换 profile 时重置任务订阅状态
        purpose: 避免切换 profile 后看到旧 profile 的任务进度或日志。
        implementation_scope:
          do:
            - profile 切换时取消旧 SSE 连接
            - 清空 TaskDrawer 当前 activeTask 与 events
          dont:
            - 不实现任务历史跨 profile 聚合
            - 不修改后端任务执行逻辑
        files_modules:
          - web/frontend/src/stores/tasks.ts
          - web/frontend/src/hooks/useTaskStream.ts
          - web/frontend/src/components/tasks/TaskDrawer.tsx
          - web/frontend/src/stores/profile.ts
        detailed_requirements:
          - profile 变化触发订阅断开与状态清理。
          - UI 明确进入“未选择任务”状态。
          - 不影响同 profile 的正常任务展示。
          - 清理逻辑应幂等，可重复调用。
        acceptance_criteria:
          - 切换 profile 后旧日志不再显示。
          - 网络面板中旧 SSE 连接被关闭。
          - 新 profile 可正常建立新任务订阅。
        dependencies:
          - P0-T2
          - P0-T4

  P1:
    name: Profile 隔离与并发基础
    tasks:
      - id: P1-T1
        title: 实现 UserContextManager 基础结构
        purpose: 为每个 profile 提供独立 runtime 上下文，防止配置与资源串台。
        implementation_scope:
          do:
            - 新建 user_context 模块与 UserContext 数据结构
            - 支持按 profile 获取/缓存 context
          dont:
            - 不在本任务实现全部业务对象初始化细节
            - 不实现鉴权
        files_modules:
          - web/backend/user_context.py
          - web/backend/deps.py
          - web/backend/app.py
        detailed_requirements:
          - UserContext 至少包含 profile_name/env_path/db_path/task_registry/task_lock。
          - 提供 get(profile) 与 profile 校验逻辑。
          - 为未来 auth/tenant 扩展预留 RequestContext 注入点。
          - context 缓存生命周期可控。
        acceptance_criteria:
          - 同进程可为不同 profile 返回不同 context 实例。
          - profile 不存在时返回标准错误。
          - 业务路由可通过依赖注入拿到 context。
        dependencies:
          - P0-T5

      - id: P1-T2
        title: 实现两层锁机制
        purpose: 保证单机单 Web 进程 + 同 profile 重任务互斥。
        implementation_scope:
          do:
            - 实现 web-server.lock
            - 实现 profile-{name}.lock
          dont:
            - 不实现分布式锁
            - 不实现任务排队系统
        files_modules:
          - web/backend/lock.py
          - web/backend/__main__.py
          - web/backend/tasks.py
          - data/locks/
        detailed_requirements:
          - Web 启动时抢占 server lock，失败则退出并提示。
          - 重任务启动前抢 profile lock，失败返回 409。
          - 任务结束（done/error/canceled）释放 profile lock。
          - 异常退出后提供锁恢复策略（超时或启动清理）。
        acceptance_criteria:
          - 同机第二个 Web 进程无法启动。
          - 同 profile 同时触发两重任务，第二个被拒绝。
          - 不同 profile 可并发触发重任务。
        dependencies:
          - P1-T1

      - id: P1-T3
        title: TaskRegistry 按 profile 隔离
        purpose: 避免任务状态、结果、取消操作跨 profile 串台。
        implementation_scope:
          do:
            - 将任务存储键改为 profile + task_id
            - 提供按 profile 的 submit/get/cancel/events
          dont:
            - 不实现跨 profile 任务查询
            - 不改动前端任务 UI
        files_modules:
          - web/backend/tasks.py
          - web/backend/routers/tasks.py
          - web/backend/schemas.py
        detailed_requirements:
          - 任务创建时必须绑定 profile。
          - 查询/取消任务时校验 profile 归属。
          - 返回错误区分 task 不存在与 profile 不匹配。
          - 为后续 scope_id 扩展预留字段。
        acceptance_criteria:
          - A profile 无法查询或取消 B profile 的 task。
          - 任务状态流转 pending/running/done/error/canceled 正常。
          - 兼容现有任务提交流程。
        dependencies:
          - P1-T1

      - id: P1-T4
        title: SSE 按 profile + task_id 隔离
        purpose: 防止任务事件流串台，确保 TaskDrawer 展示正确归属。
        implementation_scope:
          do:
            - SSE 查询绑定 profile + task_id
            - 非归属访问返回明确错误
          dont:
            - 不实现 WebSocket 替换
            - 不实现历史事件持久化
        files_modules:
          - web/backend/routers/tasks.py
          - web/backend/logger_bridge.py
          - web/frontend/src/hooks/useTaskStream.ts
        detailed_requirements:
          - `/api/tasks/{task_id}/events` 必须读取 X-Momo-Profile。
          - 事件推送必须仅来源于当前 profile 的 registry。
          - 错误 task_id 或错误 profile 返回结构化错误。
          - 前端断线重连时保留 profile 归属校验。
        acceptance_criteria:
          - A profile 不会收到 B profile 的 SSE 事件。
          - 错误 profile 访问同 task_id 会失败。
          - 正常任务流可持续接收直到终态。
        dependencies:
          - P1-T3
          - P0-T4

  P2:
    name: 后端核心 API 打通
    tasks:
      - id: P2-T1
        title: 统一 API 响应结构
        purpose: 降低前端解析复杂度并统一错误处理策略。
        implementation_scope:
          do:
            - 为核心路由统一返回 {ok,data,error}
            - 规范错误码与 message
          dont:
            - 不重写业务逻辑
            - 不引入国际化错误文案
        files_modules:
          - web/backend/schemas.py
          - web/backend/routers/*.py
        detailed_requirements:
          - success 返回 ok=true, error=null。
          - error 返回 ok=false, data=null, error.code/error.message。
          - 保留 HTTP status 语义（400/404/409/500）。
          - 更新受影响测试断言。
        acceptance_criteria:
          - 核心 API 返回结构一致。
          - 前端可统一处理 success/error。
          - 旧测试更新后通过。
        dependencies:
          - P0-T5

      - id: P2-T2
        title: 打通 study 核心 API
        purpose: 支撑 Today/Future/Iteration 三个主流程的数据与任务触发。
        implementation_scope:
          do:
            - 校准 today/future/process/iterate 接口
            - 保证接口按 profile 返回独立数据
          dont:
            - 不做页面视觉改造
            - 不做复杂筛选策略重写
        files_modules:
          - web/backend/routers/study.py
          - web/backend/deps.py
          - web/frontend/src/pages/TodayTasks.tsx
          - web/frontend/src/pages/FuturePlan.tsx
          - web/frontend/src/pages/Iteration.tsx
        detailed_requirements:
          - GET today/future 返回可渲染列表数据。
          - POST process/iterate 返回 task_id。
          - profile header 缺失或错误要有明确报错。
          - Future days 参数校验明确。
        acceptance_criteria:
          - 三个页面可用真实数据渲染。
          - 触发任务后能拿到 task_id 并打开抽屉。
          - 错误场景提示清晰。
        dependencies:
          - P1-T1
          - P2-T1

      - id: P2-T3
        title: 打通 words/sync/preflight/stats API
        purpose: 让二级页面摆脱占位态，具备可用数据能力。
        implementation_scope:
          do:
            - 打通 words、sync、preflight、stats 对应路由
            - 保证按 profile 隔离
          dont:
            - 不在本任务实现高级图表
            - 不做大规模性能优化
        files_modules:
          - web/backend/routers/words.py
          - web/backend/routers/sync.py
          - web/backend/routers/preflight.py
          - web/backend/routers/stats.py
          - web/frontend/src/pages/WordLibrary.tsx
          - web/frontend/src/pages/SyncStatus.tsx
          - web/frontend/src/pages/Preflight.tsx
          - web/frontend/src/pages/Dashboard.tsx
        detailed_requirements:
          - words 支持基础分页参数。
          - sync 返回队列/失败摘要，支持 flush。
          - preflight 返回检查项与状态。
          - stats 提供 dashboard 基础汇总字段。
        acceptance_criteria:
          - 二级页面可渲染真实数据。
          - profile 切换后二级页面数据同步切换。
          - flush/preflight 动作可执行并反馈结果。
        dependencies:
          - P2-T1

  P3:
    name: Web 主流程端到端
    tasks:
      - id: P3-T1
        title: Today 页面加入行级进度列
        purpose: 让每个单词的处理状态可见，不再只有总任务进度。
        implementation_scope:
          do:
            - Today 表格增加“进度”列
            - 展示每词状态与失败摘要
          dont:
            - 不在本任务实现复杂动画
            - 不实现跨页面统一组件抽象
        files_modules:
          - web/frontend/src/pages/TodayTasks.tsx
          - web/frontend/src/api/types.ts
          - web/backend/routers/study.py
        detailed_requirements:
          - 行级状态最小集合：待处理/处理中/已完成/失败。
          - 失败时展示短错误信息（可 tooltip 或行内摘要）。
          - 进度列为空时显示占位状态，避免空白。
          - 列表刷新后状态正确同步。
        acceptance_criteria:
          - 每个单词行可看到当前处理状态。
          - 失败项可快速定位。
          - 不影响“全部处理”触发流程。
        dependencies:
          - P2-T2

      - id: P3-T2
        title: Future 页面加入行级进度列
        purpose: 与 Today 保持一致的可观测性，减少未来任务黑盒感。
        implementation_scope:
          do:
            - Future 表格增加“进度”列
            - 支持按行查看状态/失败
          dont:
            - 不改动 Future 查询参数模型
            - 不新增复杂筛选器
        files_modules:
          - web/frontend/src/pages/FuturePlan.tsx
          - web/frontend/src/api/types.ts
          - web/backend/routers/study.py
        detailed_requirements:
          - 与 Today 使用同一状态语义。
          - 天数切换后行级状态跟随数据刷新。
          - 行状态与任务总状态一致。
          - 空列表态文案保持清晰。
        acceptance_criteria:
          - Future 列表有可用行级进度展示。
          - 切换天数后状态正确刷新。
          - 任务失败项可定位。
        dependencies:
          - P3-T1

      - id: P3-T3
        title: Iteration 列表化与行级进度
        purpose: 将迭代流程从单按钮黑盒升级为可观测批处理。
        implementation_scope:
          do:
            - Iteration 页面展示待迭代条目列表
            - 增加行级状态列
          dont:
            - 不在本任务实现复杂评分可视化
            - 不改底层迭代算法
        files_modules:
          - web/frontend/src/pages/Iteration.tsx
          - web/backend/routers/study.py
          - web/frontend/src/api/types.ts
        detailed_requirements:
          - 至少展示词项、基础指标、行级状态。
          - 启动迭代后状态实时更新。
          - 失败项可查看短错误原因。
          - 与 profile 切换逻辑兼容。
        acceptance_criteria:
          - Iteration 页面可按行观察执行状态。
          - 不依赖 CLI 即可判断迭代进展。
          - 失败可定位到具体条目。
        dependencies:
          - P2-T2

  P4:
    name: TaskDrawer 与结构化进度
    tasks:
      - id: P4-T1
        title: 定义结构化进度事件协议
        purpose: 统一总任务进度与行级进度的数据来源。
        implementation_scope:
          do:
            - 定义任务级与行级事件字段
            - 约定最小事件类型
          dont:
            - 不在本任务改 UI
            - 不实现事件持久化
        files_modules:
          - web/backend/schemas.py
          - web/backend/logger_bridge.py
          - web/frontend/src/api/types.ts
        detailed_requirements:
          - 任务级字段：phase/status/current/total/message/timestamp。
          - 行级字段：item_id/status/phase/error/current/total。
          - 兼容旧 log 事件，渐进迁移。
          - 字段缺失时前端有兜底展示。
        acceptance_criteria:
          - 前后端对事件字段定义一致。
          - 新事件可被前端正确解析。
          - 不破坏现有任务流。
        dependencies:
          - P1-T4

      - id: P4-T2
        title: TaskDrawer 升级为结构化展示
        purpose: 用户无需阅读原始日志也能判断任务进度和阶段。
        implementation_scope:
          do:
            - 展示阶段、总进度、成功/失败计数
            - 原始日志改为折叠区
          dont:
            - 不实现复杂图表
            - 不实现跨 profile 历史中心
        files_modules:
          - web/frontend/src/components/tasks/TaskDrawer.tsx
          - web/frontend/src/hooks/useTaskStream.ts
          - web/frontend/src/stores/tasks.ts
        detailed_requirements:
          - 顶部展示当前 profile、任务状态、阶段。
          - 中部展示总进度条与关键步骤。
          - 日志默认折叠，按需展开。
          - 终态（done/error/canceled）显示结果摘要。
        acceptance_criteria:
          - 默认视图可直接理解任务进度。
          - 原始日志仍可查看。
          - 与行级状态无冲突。
        dependencies:
          - P4-T1

  P5:
    name: 二级能力补齐
    tasks:
      - id: P5-T1
        title: Word Library 可用化
        purpose: 支持日常查词与定位异常词。
        implementation_scope:
          do:
            - 实现分页与基础搜索
            - 显示详情与迭代历史入口
          dont:
            - 不实现高级全文检索
            - 不实现批量编辑工具
        files_modules:
          - web/frontend/src/pages/WordLibrary.tsx
          - web/backend/routers/words.py
        detailed_requirements:
          - 支持 page/page_size 基础分页。
          - 支持关键词搜索。
          - 可进入详情查看 AI notes/历史。
          - 数据按 profile 隔离。
        acceptance_criteria:
          - 页面能完成“查词-看详情”闭环。
          - profile 切换后数据源正确切换。
          - 分页和搜索行为稳定。
        dependencies:
          - P2-T3

      - id: P5-T2
        title: Sync Status 可观测化
        purpose: 让同步问题在 Web 内可发现、可操作。
        implementation_scope:
          do:
            - 展示同步队列与失败摘要
            - 支持手动 flush
          dont:
            - 不实现自动冲突修复
            - 不实现复杂 diff 视图
        files_modules:
          - web/frontend/src/pages/SyncStatus.tsx
          - web/backend/routers/sync.py
        detailed_requirements:
          - 显示队列深度、最近失败、冲突数。
          - flush 操作有进行中与结果反馈。
          - 错误提示可读。
          - 数据按 profile 隔离。
        acceptance_criteria:
          - 用户能判断同步是否健康。
          - flush 可执行且结果可见。
          - 失败项可定位。
        dependencies:
          - P2-T3

      - id: P5-T3
        title: Preflight 一键体检完善
        purpose: 在 Web 内完成基础故障排查。
        implementation_scope:
          do:
            - 展示 API/AI/DB/Sync 检查结果
            - 提供简短修复建议
          dont:
            - 不实现自动修复脚本
            - 不覆盖所有极端故障
        files_modules:
          - web/frontend/src/pages/Preflight.tsx
          - web/backend/routers/preflight.py
        detailed_requirements:
          - 检查项状态清晰（通过/失败/警告）。
          - 失败项显示简短 fix hint。
          - 支持手动重跑检查。
          - 结果按 profile 隔离。
        acceptance_criteria:
          - 无需 CLI 可完成基础体检。
          - 失败项可读且可行动。
          - 重跑流程稳定。
        dependencies:
          - P2-T3

  P6:
    name: 视觉统一与体验打磨
    tasks:
      - id: P6-T1
        title: 建立全局设计 Token
        purpose: 统一视觉基线并减少页面风格漂移。
        implementation_scope:
          do:
            - 定义颜色、字号、间距、圆角、阴影 token
            - 在全站样式中接入 token
          dont:
            - 不在此任务逐页重构全部组件
            - 不引入新 UI 框架
        files_modules:
          - web/frontend/src/index.css
          - web/frontend/src/App.tsx
          - web/frontend/src/components/layout/*
        detailed_requirements:
          - 采用轻量现代风，明确主色/中性色/状态色。
          - token 命名稳定，便于 Stitch 产物映射。
          - 旧硬编码颜色逐步替换为 token。
          - 保持移动端基本可读性。
        acceptance_criteria:
          - 全站使用统一 token 体系。
          - 关键页面无明显视觉割裂。
          - 不影响既有业务功能。
        dependencies:
          - P3-T3

      - id: P6-T2
        title: Stitch MCP 产物接入规范落地
        purpose: 建立“设计先行、代码落地”的稳定协作方式。
        implementation_scope:
          do:
            - 为核心页面建立 Stitch 设计稿与映射清单
            - 形成组件实现对照规则
          dont:
            - 不在本任务改全部页面代码
            - 不引入额外设计平台依赖
        files_modules:
          - docs/dev/WEB_UI_EXEC_PLAN.md
          - docs/dev/WEB_UI_STATUS.yaml
          - web/frontend/src/pages/*
        detailed_requirements:
          - UserGateway/Today/Future/Iteration/TaskDrawer 先覆盖。
          - 每页记录“Stitch 设计点 -> 代码实现点”。
          - 保留设计版本标识，便于回溯。
          - 新页面默认遵循该规范。
        acceptance_criteria:
          - 核心页面有 Stitch 对照记录。
          - 后续页面可按同模板执行。
          - 设计到实现链路可追溯。
        dependencies:
          - P6-T1

  P7:
    name: CLI 降级备用
    tasks:
      - id: P7-T1
        title: Web/CLI 锁语义统一
        purpose: 避免 Web 与 CLI 对同 profile 并发写造成冲突。
        implementation_scope:
          do:
            - CLI 使用同 profile lock 规则
            - 冲突时输出明确提示
          dont:
            - 不移除 CLI 功能
            - 不改 CLI 主交互流程
        files_modules:
          - main.py
          - core/*
          - web/backend/lock.py
        detailed_requirements:
          - CLI 启动重任务前检查 profile lock。
          - 冲突提示包含占用来源与建议动作。
          - 不同 profile 允许并发执行。
          - 不破坏现有 CLI 回退能力。
        acceptance_criteria:
          - Web 跑 userA 时 CLI 跑 userA 被拦截并提示。
          - Web 跑 userA 时 CLI 跑 userB 可执行。
          - CLI 原有关键流程仍可运行。
        dependencies:
          - P1-T2

