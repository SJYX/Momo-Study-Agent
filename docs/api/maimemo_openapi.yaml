openapi: 3.1.0
info:
  title: 墨墨开放 API
  version: v1
  description: >+
    # 说明

    请先到墨墨背单词 app 上申请访问开放 API 的 token。然后在请求的 headers 中添加 `Authorization: Bearer
    xxx`, curl 示例如下：


    ```bash

    curl --request GET \
      --url https://open.maimemo.com/open/api/v1/phrases \
      --header 'Accept: application/json' \
      --header 'Authorization: Bearer xxx'
    ```


    ## 请求频控

    - 10 秒 20 次

    - 60 秒 40 次

    - 5 小时 2000 次

    ## 错误码

    ### 释义

    | 状态码 | 错误码 | 说明 |

    | ----- | ----- | --- |



    ### 助记

    | 状态码 | 错误码 | 说明 |

    | ----- | ----- | --- |



    ### 云词本

    | 状态码 | 错误码 | 说明 |

    | ----- | ----- | --- |



    ### 例句

    | 状态码 | 错误码 | 说明 |

    | ----- | ----- | --- |



    ### 学习数据（公测）

    | 状态码 | 错误码 | 说明 |

    | ----- | ----- | --- |



    ### 令牌

    | 状态码 | 错误码 | 说明 |

    | ----- | ----- | --- |



    ### 单词

    | 状态码 | 错误码 | 说明 |

    | ----- | ----- | --- |

paths:
  /api/v1/interpretations:
    servers:
      - url: 'https://open.maimemo.com/open'
        description: 生产服务
      - url: 'https://open-dev.maimemo.com/open'
        description: 测试服务
    get:
      tags:
        - 释义
      operationId: >-
        maimemo.openapi.interpretation.v1.InterpretationService.ListInterpretations
      summary: 获取释义
      requestBody: {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                description: 暂无文档
                properties:
                  interpretations:
                    description: '释义列表<br><br>引用自：[Interpretation](/schemas/Interpretation)'
                    type: array
                    items:
                      $ref: '#/components/schemas/Interpretation'
                required:
                  - interpretations
      parameters:
        - name: voc_id
          in: query
          deprecated: false
          required: true
          description: 单词 id
          schema:
            description: 单词 id
            type: string
            example: 5a7BFf4F63612e5AD9fdebB7a50D3881
      security:
        - user:
            - ''
      description: 获取单词下自己创建的释义
    post:
      tags:
        - 释义
      operationId: >-
        maimemo.openapi.interpretation.v1.InterpretationService.CreateInterpretation
      summary: 创建释义
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: 暂无文档
              properties:
                interpretation:
                  description: ''
                  type: object
                  properties:
                    voc_id:
                      description: 单词 id
                      type: string
                      example: 5a7BFf4F63612e5AD9fdebB7a50D3881
                    interpretation:
                      description: 释义
                      type: string
                      example: n. 苹果
                    tags:
                      description: 标签
                      type: array
                      example:
                        - 考研
                      items:
                        type: string
                    status:
                      description: >-
                        状态

                        @Example
                        PUBLISHED<br><br>引用自：[InterpretationStatus](/schemas/InterpretationStatus)
                      type: object
                      $ref: '#/components/schemas/InterpretationStatus'
                  required:
                    - voc_id
                    - interpretation
                    - tags
                    - status
              required:
                - interpretation
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                description: 暂无文档
                properties:
                  interpretation:
                    description: '释义<br><br>引用自：[Interpretation](/schemas/Interpretation)'
                    type: object
                    $ref: '#/components/schemas/Interpretation'
                required:
                  - interpretation
      parameters: []
      security:
        - user:
            - ''
  '/api/v1/interpretations/{id}':
    servers:
      - url: 'https://open.maimemo.com/open'
        description: 生产服务
      - url: 'https://open-dev.maimemo.com/open'
