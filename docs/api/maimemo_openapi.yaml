components:
  schemas:
    InterpretationStatus:
      type: string
      description: |-
        释义状态

        - `PUBLISHED`: 发布
        - `UNPUBLISHED`: 未发布
        - `DELETED`: 删除
      enum:
        - PUBLISHED
        - UNPUBLISHED
        - DELETED
    Interpretation:
      type: object
      description: 释义
      properties:
        id:
          description: id
          type: string
          example: 5a7BFf4F63612e5AD9fdebB7a50D3881
        interpretation:
          description: 释义
          type: string
          example: n. 苹果
        tags:
          description: 标签
          type: array
          example:
            - 考研
          items:
            type: string
        status:
          description: >-
            状态

            @Example
            PUBLISHED<br><br>引用自：[InterpretationStatus](/schemas/InterpretationStatus)
          type: object
          $ref: '#/components/schemas/InterpretationStatus'
        created_time:
          description: |-
            创建时间
            ISO 8601 格式
          type: string
          format: ISODate
          example: '2023-03-13T16:00:00.000Z'
        updated_time:
          description: |-
            更新时间
            ISO 8601 格式
          type: string
          format: ISODate
          example: '2023-03-13T16:00:00.000Z'
      required:
        - id
        - interpretation
        - tags
        - status
        - created_time
        - updated_time
    NoteStatus:
      type: string
      description: |-
        助记状态

        - `PUBLISHED`: 发布
        - `DELETED`: 删除
      enum:
        - PUBLISHED
        - DELETED
    Note:
      type: object
      description: 助记
      properties:
        id:
          description: id
          type: string
          example: 5a7BFf4F63612e5AD9fdebB7a50D3881
        note_type:
          description: 类型
          type: string
          example: 谐音.
        note:
          description: 助记
          type: string
          example: apple
        status:
          description: |-
            状态
            @Example PUBLISHED<br><br>引用自：[NoteStatus](/schemas/NoteStatus)
          type: object
          $ref: '#/components/schemas/NoteStatus'
        created_time:
          description: |-
            创建时间
            ISO 8601 格式
          type: string
          format: ISODate
          example: '2023-03-13T16:00:00.000Z'
        updated_time:
          description: |-
            更新时间
            ISO 8601 格式
          type: string
          format: ISODate
          example: '2023-03-13T16:00:00.000Z'
      required:
        - id
        - note_type
        - note
        - status
        - created_time
        - updated_time
    NotepadStatus:
      type: string
      description: |-
        云词本状态

        - `PUBLISHED`: 发布
        - `UNPUBLISHED`: 未发布
        - `DELETED`: 删除
      enum:
        - PUBLISHED
        - UNPUBLISHED
        - DELETED
    NotepadType:
      type: string
      description: |-
        云词本类型

        - `FAVORITE`: 我的收藏
        - `NOTEPAD`: 云词本
      enum:
        - FAVORITE
        - NOTEPAD
    NotepadParsedItem:
      type: object
      description: 云词本解析结果
      properties:
        type:
          description: 类型
          type: string
          enum:
            - CHAPTER
            - WORD
          example: CHAPTER
        data:
          description: 数据
          type: object
          properties:
            chapter:
              description: 章节
              type: string
              example: 我的章节
            word:
              description: |-
                单词
                当 type=WORD 时，该字段才有值
              type: string
              example: apple
          required:
            - chapter
      required:
        - type
        - data
    Notepad:
      type: object
      description: 云词本
      properties:
        id:
          description: id
          type: string
          example: 5a7BFf4F63612e5AD9fdebB7a50D3881
        type:
          description: |-
            类型
            @Example NOTEPAD<br><br>引用自：[NotepadType](/schemas/NotepadType)
          type: object
          $ref: '#/components/schemas/NotepadType'
        creator:
          description: 创建者 id
          type: integer
          example: 192
        status:
          description: >-
            状态

            @Example
            PUBLISHED<br><br>引用自：[NotepadStatus](/schemas/NotepadStatus)
          type: object
          $ref: '#/components/schemas/NotepadStatus'
        content:
          description: 内容
          type: string
          example: apple
