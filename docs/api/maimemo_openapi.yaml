          deprecated: false
          required: true
          description: 释义 id
          schema:
            description: 释义 id
            type: string
            example: 5a7BFf4F63612e5AD9fdebB7a50D3881
      security:
        - user:
            - ''
    delete:
      tags:
        - 释义
      operationId: >-
        maimemo.openapi.interpretation.v1.InterpretationService.DeleteInterpretation
      summary: 删除释义
      requestBody: {}
      responses: {}
      parameters:
        - name: id
          in: path
          deprecated: false
          required: true
          description: 释义 id
          schema:
            description: 释义 id
            type: string
            example: 5a7BFf4F63612e5AD9fdebB7a50D3881
