                type: object
                description: 暂无文档
                properties:
                  interpretation:
                    description: '释义<br><br>引用自：[Interpretation](/schemas/Interpretation)'
                    type: object
                    $ref: '#/components/schemas/Interpretation'
                required:
                  - interpretation
      parameters:
        - name: id
