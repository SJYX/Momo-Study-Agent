          type: string
          format: ISODate
          example: '2023-03-13T16:00:00.000Z'
      required:
        - id
        - type
        - creator
        - status
        - title
        - brief
        - tags
        - created_time
        - updated_time
    PhraseStatus:
      type: string
      description: |-
        例句状态

