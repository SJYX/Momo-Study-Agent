          description: 标题
          type: string
          example: 常用词汇
        brief:
          description: 简介
          type: string
          example: 常用
        tags:
          description: 标签
          type: array
          example:
            - 考研
          items:
            type: string
        list:
          description: '解析结果<br><br>引用自：[NotepadParsedItem](/schemas/NotepadParsedItem)'
          type: array
          items:
            $ref: '#/components/schemas/NotepadParsedItem'
        created_time:
          description: |-
            创建时间
            ISO 8601 格式
          type: string
          format: ISODate
          example: '2023-03-13T16:00:00.000Z'
        updated_time:
          description: |-
            更新时间
            ISO 8601 格式
          type: string
          format: ISODate
          example: '2023-03-13T16:00:00.000Z'
      required:
        - id
        - type
        - creator
        - status
        - content
        - title
        - brief
        - tags
        - list
        - created_time
        - updated_time
    BriefNotepad:
