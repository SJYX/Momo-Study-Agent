# pre-commit hooks
# 安装：`pre-commit install`（一次性）
# 手工跑全仓：`pre-commit run --all-files`
# 跳过：`git commit --no-verify`（不推荐）

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(docs/|tests/.*\.txt$|.*\.lock$)
      - id: end-of-file-fixer
        exclude: ^(docs/|.*\.lock$|.*\.json$)
      - id: check-yaml
        exclude: ^web/frontend/
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict

  # Ruff: lint + format（配置在 pyproject.toml 中）
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # 前端 ESLint：仅在前端文件改动时跑
  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend-eslint
        entry: bash -c 'cd web/frontend && npx eslint --max-warnings=0'
        language: system
        files: ^web/frontend/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
        # 在没有装 npm 依赖的环境（如 CI 仅跑后端）会跳过
        require_serial: true

      - id: frontend-typecheck
        name: frontend-typecheck
        entry: bash -c 'cd web/frontend && npx tsc -b'
        language: system
        files: ^web/frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
        require_serial: true
